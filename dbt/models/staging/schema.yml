version: 2

models:
  - name: stg_weather_readings
    description: "Cleaned hourly weather readings — 50 cities, suspicious values removed"
    columns:
      - name: city_id
        description: "Foreign key to cities"
        tests:
          - not_null
      - name: reading_at
        tests:
          - not_null
      - name: temperature_c
        tests:
          - not_null

  - name: stg_cities
    description: "City dimension enriched with region"
    columns:
      - name: id
        tests:
          - not_null
          - unique
      - name: name
        tests:
          - not_null