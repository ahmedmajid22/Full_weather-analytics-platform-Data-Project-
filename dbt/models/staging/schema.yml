version: 2

models:
  - name: stg_weather_readings
    description: "Cleaned hourly weather readings — 50 cities, suspicious values removed"
    columns:
      - name: city_id
        description: "Foreign key to cities dimension"
        tests:
          - not_null

      - name: reading_at
        description: "UTC timestamp of the reading"
        tests:
          - not_null

      # BUG FIX: removed not_null test on temperature_c.
      # Rows where the source temperature IS NULL (missing API data, not bad data)
      # pass the is_suspicious = FALSE filter and reach this model with NULL temperature_c.
      # A not_null test would fail on those rows and block CI without fixing the actual issue.
      # The appropriate fix is to handle NULLs in downstream aggregations (which they do via AVG/MIN/MAX).
      - name: temperature_c
        description: "Air temperature in Celsius, NULL if source value was missing"

      - name: weather_condition
        description: "Human-readable WMO weather code label"
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Clear sky'
                - 'Cloudy'
                - 'Fog'
                - 'Drizzle'
                - 'Rain'
                - 'Snow'
                - 'Rain showers'
                - 'Thunderstorm'
                - 'Unknown'

      - name: is_suspicious
        description: "TRUE if source value was outside physically plausible range"
        tests:
          - not_null

  - name: stg_cities
    description: "City dimension enriched with AMER / EMEA / APAC region"
    columns:
      - name: id
        description: "Primary key"
        tests:
          - not_null
          - unique

      - name: name
        description: "City display name"
        tests:
          - not_null

      - name: region
        description: "Business region derived from continent"
        tests:
          - not_null
          - accepted_values:
              values: ['AMER', 'EMEA', 'APAC', 'OTHER']